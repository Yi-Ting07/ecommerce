spring.application.name=backend

# ============================
# PostgreSQL 資料庫連線設定
# ============================
# 連線到本機 PostgreSQL 的 ecommerce_db 資料庫
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_db
# 資料庫登入帳號（等一下會建立這個帳號）
spring.datasource.username=ecommerce_user
# 資料庫登入密碼（等一下會設定）
spring.datasource.password=ecommerce_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================
# JPA / Hibernate 設定
# ============================
# update = 啟動時自動根據 Entity 更新資料表結構（開發用，不會刪除已有資料）
spring.jpa.hibernate.ddl-auto=update
# 在 console 顯示 SQL 語句，方便 debug
spring.jpa.show-sql=true

# ============================
# JWT 設定
# ============================
# JWT 簽名用的密鑰（至少 256-bit / 32 字元以上）
app.jwt.secret=MyEcommerceSecretKeyForJWT2026SuperSecureKeyHere!!
# Token 有效時間（毫秒）= 24 小時
app.jwt.expiration-ms=86400000

# ============================
# 伺服器設定
# ============================
server.port=7687

# ============================
# 檔案上傳設定（商品圖片用）
# ============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# 圖片儲存目錄（相對於後端執行的工作目錄，即 backend/ 資料夾）
# 上傳的圖片會存在 backend/uploads/xxx.jpg
# 瀏覽器可透過 http://localhost:7687/uploads/xxx.jpg 存取
app.upload.dir=uploads

# ============================
# 應用程式名稱（顯示於 2FA Email 與 TOTP QR Code）
# ============================
app.name=E-Commerce Shop

# ============================
# Email 設定（雙重驗證 Email OTP 用）
# 若未設定，系統會以開發模式運作（OTP 會 log 到 console）
# ============================
# Gmail 範例（請改為自己的帳號，密碼需使用「應用程式密碼」）
#spring.mail.host=smtp.gmail.com
#spring.mail.port=587
#spring.mail.username=your-email@gmail.com
#spring.mail.password=your-app-password
#spring.mail.properties.mail.smtp.auth=true
